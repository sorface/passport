spring:

  # nosql database
  data.redis:
    client-type: lettuce
    database: 1
    host: ${REDIS_HOST}
    port: 6379
    username: ${REDIS_USERNAME}
    password: ${REDIS_PASSWORD}
    lettuce:
      pool:
        max-active: 60
        max-idle: 10

  # sql database
  jpa:
    open-in-view: false
    show-sql: false
    database: postgresql
    properties:
      hibernate:
        format_sql: true

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: ${DRIVER_CLASS_NAME}
    hikari:
      connection-timeout: 30000
      connection-test-query: select 1
      maximum-pool-size: 10
      minimum-idle: 10
      initialization-fail-timeout: 1
      leak-detection-threshold: 0
      pool-name: "hikari-pool-passport"
      register-mbeans: true

  # migration database
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/master.yaml
